<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文档智能分析系统</title>
<style>
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --text-secondary: #666;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --success: #16a34a;
  --warning: #f59e0b;
  --danger: #dc2626;
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 360px;
  min-width: 360px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}

.sidebar-header p {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Status Badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.status-badge.ready {
  background: #dcfce7;
  color: var(--success);
}

.status-badge.empty {
  background: #fef3c7;
  color: var(--warning);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
}

/* Upload Area */
.upload-section {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: #fafafa;
}

.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: #eff6ff;
}

.upload-icon {
  font-size: 36px;
  margin-bottom: 8px;
}

.upload-zone .main-text {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
}

.upload-zone .sub-text {
  font-size: 12px;
  color: var(--text-secondary);
}

.upload-zone input[type="file"] {
  display: none;
}

/* File List */
.file-list-section {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.file-list-section h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  background: #f9fafb;
  margin-bottom: 8px;
  transition: background .15s;
}

.file-item:hover { background: #f0f0f0; }

.file-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.file-icon.pdf  { background: #fee2e2; color: #dc2626; }
.file-icon.docx { background: #dbeafe; color: #2563eb; }
.file-icon.txt  { background: #e5e7eb; color: #4b5563; }

.file-info { flex:1; min-width:0; }

.file-info .name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-info .meta {
  font-size: 11px;
  color: var(--text-secondary);
}

.file-item .delete-btn {
  background: none;
  border: none;
  color: #999;
  cursor: pointer;
  font-size: 18px;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}

.file-item .delete-btn:hover {
  color: var(--danger);
  background: #fef2f2;
}

.empty-files {
  text-align: center;
  color: #bbb;
  font-size: 13px;
  padding: 32px 0;
}

/* Main Chat Area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #fafafa;
}

.chat-header {
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 600;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.65;
  animation: fadeIn .3s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}

.message.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}

.message.assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.message.assistant .content {
  white-space: pre-wrap;
  word-break: break-word;
}

.message.assistant.streaming { border-left: 3px solid var(--accent); }

.message.system-msg {
  align-self: center;
  background: #fef3c7;
  color: #92400e;
  font-size: 13px;
  padding: 8px 16px;
  border-radius: 20px;
  max-width: 60%;
  text-align: center;
}

/* Chat Input */
.chat-input-area {
  padding: 16px 24px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.chat-input-area input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 24px;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}

.chat-input-area input:focus {
  border-color: var(--accent);
}

.chat-input-area button {
  padding: 10px 20px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
  white-space: nowrap;
}

.chat-input-area button:hover { background: var(--accent-hover); }
.chat-input-area button:disabled { background: #a5b4fc; cursor: not-allowed; }

/* Welcome / Empty State */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  text-align: center;
  padding: 40px;
}

.welcome .icon { font-size: 56px; margin-bottom: 16px; }

.welcome h2 { font-size: 18px; color: #666; margin-bottom: 8px; }

.welcome p { font-size: 13px; color: #999; max-width: 400px; }

.hidden { display: none !important; }

/* Processing Overlay */
.upload-zone.processing {
  pointer-events: none;
  opacity: .6;
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>知识库管理</h1>
    <p>上传文档，构建 AI 知识库</p>
    <div id="statusBadge" class="status-badge empty">
      <span class="status-dot"></span> 等待文件上传
    </div>
  </div>

  <div class="upload-section">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📄</div>
      <div class="main-text">点击上传或拖拽文件</div>
      <div class="sub-text">支持 PDF(含扫描版OCR) / Word / PPT / Excel / HTML / 图片 / MD / CSV / JSON / TXT 等</div>
      <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.pptx,.xlsx,.html,.htm,.png,.jpg,.jpeg,.bmp,.tiff,.tif,.txt,.md,.csv,.json,.xml,.log">
    </div>
  </div>

  <div class="file-list-section">
    <h3>已上传文件</h3>
    <div id="fileList">
      <div class="empty-files">暂无文件</div>
    </div>
  </div>
</aside>

<!-- Main Chat -->
<section class="main">
  <div class="chat-header">AI 问答</div>

  <div class="chat-messages" id="chatMessages">
    <div class="welcome" id="welcomeState">
      <div class="icon">💬</div>
      <h2>上传文件后开始提问</h2>
      <p>系统会基于你上传的文档内容回答所有问题，支持 PDF、Word 和纯文本文件</p>
    </div>
  </div>

  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="输入问题，基于文档内容回答..." disabled>
    <button id="sendBtn" disabled>发送</button>
  </div>
</section>

<script>
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const statusBadge = document.getElementById('statusBadge');
const welcomeState = document.getElementById('welcomeState');

let isStreaming = false;
let _lastReadyState = null;

function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function hideWelcome() {
  welcomeState?.classList.add('hidden');
}

function addMessage(className, text) {
  hideWelcome();
  const el = document.createElement('div');
  el.className = 'message ' + className;
  el.textContent = text;
  chatMessages.appendChild(el);
  scrollToBottom();
  return el;
}

function addSystemMessage(text) {
  return addMessage('system-msg', text);
}

function addUserMessage(text) {
  return addMessage('user', text);
}

function addAssistantMessage(text) {
  const el = document.createElement('div');
  el.className = 'message assistant';
  const content = document.createElement('div');
  content.className = 'content';
  content.textContent = text;
  el.appendChild(content);
  chatMessages.appendChild(el);
  scrollToBottom();
  return el;
}

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});

uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('drag-over');
});

uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0) uploadFile(files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) {
    uploadFile(fileInput.files[0]);
    fileInput.value = '';
  }
});

async function uploadFile(file) {
  uploadZone.classList.add('processing');
  addSystemMessage(`正在处理 "${file.name}" ...`);

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/upload', { method:'POST', body:formData });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    addSystemMessage(`"${file.filename}" 处理完成 — ${data.chunks} 个文本块，共 ${data.total_chars} 字符`);
    await refreshAll();
  } catch (e) {
    addSystemMessage(`处理失败: ${e.message}`);
  } finally {
    uploadZone.classList.remove('processing');
  }
}

async function refreshStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    updateStatusBadge(data.ready);
  } catch (e) {
    // ignore
  }
}

function updateStatusBadge(ready) {
  if (ready === _lastReadyState) return;
  _lastReadyState = ready;

  statusBadge.className = 'status-badge ' + (ready ? 'ready' : 'empty');
  statusBadge.textContent = '';
  const dot = document.createElement('span');
  dot.className = 'status-dot';
  statusBadge.appendChild(dot);
  statusBadge.appendChild(document.createTextNode(ready ? ' 知识库就绪' : ' 等待文件上传'));

  chatInput.disabled = !ready;
  sendBtn.disabled = !ready;
  chatInput.placeholder = ready ? '输入问题，基于文档内容回答...' : '请先上传文件建立知识库';
}

function refreshAll() {
  return Promise.all([refreshStatus(), refreshFileList()]);
}

async function refreshFileList() {
  try {
    const res = await fetch('/api/files');
    const files = await res.json();
    renderFileList(files);
  } catch (e) {
    // ignore
  }
}

fileList.addEventListener('click', (e) => {
  const btn = e.target.closest('.delete-btn');
  if (!btn) return;
  deleteFile(btn.dataset.fileId);
});

function renderFileList(files) {
  fileList.textContent = '';
  if (files.length === 0) {
    const el = document.createElement('div');
    el.className = 'empty-files';
    el.textContent = '暂无文件';
    fileList.appendChild(el);
    return;
  }

  const typeIcons = { '.pdf':'PDF', '.docx':'DOC', '.txt':'TXT' };
  const typeClasses = { '.pdf':'pdf', '.docx':'docx', '.txt':'txt' };

  files.forEach(f => {
    const item = document.createElement('div');
    item.className = 'file-item';

    const icon = document.createElement('div');
    icon.className = 'file-icon ' + (typeClasses[f.type] || 'txt');
    icon.textContent = typeIcons[f.type] || 'FILE';
    item.appendChild(icon);

    const info = document.createElement('div');
    info.className = 'file-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.title = f.filename;
    nameEl.textContent = f.filename;
    info.appendChild(nameEl);

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = f.chunks + ' 块 · ' + f.chars + ' 字符';
    info.appendChild(meta);
    item.appendChild(info);

    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.dataset.fileId = f.id;
    delBtn.title = '删除';
    delBtn.textContent = '×';
    item.appendChild(delBtn);

    fileList.appendChild(item);
  });
}

async function deleteFile(fileId) {
  await fetch('/api/files/' + fileId, { method:'DELETE' });
  await refreshAll();
}

sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function* parseSSEStream(reader, decoder) {
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        yield JSON.parse(line.slice(6));
      }
    }
  }
}

async function sendMessage() {
  const question = chatInput.value.trim();
  if (!question || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  chatInput.value = '';
  addUserMessage(question);

  const assistantEl = addAssistantMessage('');
  assistantEl.classList.add('streaming');
  const contentEl = assistantEl.querySelector('.content');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });

    if (!res.ok) {
      const err = await res.json();
      contentEl.textContent = '错误: ' + (err.error || '未知错误');
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    for await (const data of parseSSEStream(reader, decoder)) {
      if (data.error) {
        contentEl.textContent = '错误: ' + data.error;
      } else if (data.content) {
        contentEl.textContent += data.content;
        scrollToBottom();
      }
    }
  } catch (e) {
    contentEl.textContent = '连接错误: ' + e.message;
  } finally {
    assistantEl.classList.remove('streaming');
    isStreaming = false;
    sendBtn.disabled = false;
    chatInput.focus();
  }
}

refreshAll();
</script>
</body>
</html>
